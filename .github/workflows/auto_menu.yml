steps:
    - name: 複製專案程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/automating-python@v4 # 或者是你原本用的 setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝 Python 依賴套件
      run: pip install -r requirements.txt

    # 🛠️ 關鍵新增這一行，幫雲端電腦裝上瀏覽器
    - name: 安裝 Playwright 瀏覽器核心
      run: playwright install chromium

    - name: 執行爬蟲腳本
      run: python main.py
