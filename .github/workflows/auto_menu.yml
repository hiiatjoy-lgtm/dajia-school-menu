- name: 透過 curl 發送圖片到 LINE
      env:
        LINE_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_TARGET_ID: ${{ secrets.LINE_USER_ID }}
      run: |
        # 1. 【選用】如果你的圖片已經上傳到某個公開網址（例如 GitHub Pages），直接填入該網址。
        # 這裡示範：先用 curl 將 menu.png 上傳到 Imgur 匿名圖床並取得圖片網址
        # (備註: Imgur 匿名上傳有時需要 Client-ID，若你有自己的圖床或固定網址可直接替換)
        
        # 假設我們已經有一個公開的圖片網址（例如：https://example.com/menu.png）
        # 如果你想直接發送網址，請參考下方的 LINE 傳送指令：
        
        IMAGE_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/downloaded_115年6月_聯引.png"
        
        echo "準備發送圖片網址: $IMAGE_URL"
        
        # 2. 使用 curl 呼叫 LINE Messaging API 發送圖片訊息
        curl -X POST https://api.line.me/v2/bot/message/push \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer $LINE_ACCESS_TOKEN" \
          -d "{
            \"to\": \"$LINE_TARGET_ID\",
            \"messages\": [
              {
                \"type\": \"image\",
                \"originalContentUrl\": \"$IMAGE_URL\",
                \"previewImageUrl\": \"$IMAGE_URL\"
              }
            ]
          }"
