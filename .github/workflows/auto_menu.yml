name: Auto Download School Menu

on:
  workflow_dispatch:

# 🛠️ 關鍵修正：強制開啟 GitHub Actions 的讀寫權限，不讓它因為權限不夠亮紅燈！
permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Scraper Script
      run: python main.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 強制把所有變更（不論是新增 menu.xlsx 還是刪除舊檔）都拉進來
        git add -A
        
        # 檢查是否有檔案變更，有的話就大膽推上去
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-downloaded menu file" && git push)
