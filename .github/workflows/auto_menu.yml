name: Auto Download School Menu

# 設定觸發時間
on:
  schedule:
    # 這裡使用的是 UTC 時間（台灣時間減 8 小時）
    # 範例：設定每週一到週五的早上 8:00 執行 (台灣時間) -> UTC 00:00
    - cron: '0 0 * * 1-5'
  workflow_dispatch: # 保留這個，讓你可以隨時在網頁上點「手動執行」測試

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 複製 GitHub 儲存庫檔案
      uses: actions/checkout@v4

    - name: 2. 安裝 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安裝相關套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. 執行爬蟲腳本
      run: python main.py

    - name: 5. 把下載下來的菜單檔案提交回 GitHub 儲存庫 (選用)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新：下載最新聯引菜單" && git push)
